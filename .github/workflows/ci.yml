name: CI

on:
  push:
    branches: [main]
  pull_request:

# Magister is Bun-first but Node-capable. CI guards BOTH runtimes:
#  - bun job:  the primary path (typecheck + full test suite on bun:test)
#  - node job: the portability path (better-sqlite3 DB smoke + API boots on Node)
# See docs/plans/2026-06-02-runtime-portability.md.

env:
  BUN_VERSION: 1.3.12

jobs:
  bun:
    name: Bun (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build:web

  node:
    name: Node (portability path)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # bun is the package manager even for the Node job — it installs deps
      # (and builds the better-sqlite3 native addon via trustedDependencies).
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: bun install --frozen-lockfile
      # DB seam on real Node: better-sqlite3 driver + drizzle adapter + FTS5 + shims.
      - run: bun run smoke:node:db
      # Whole API control plane boots on Node and serves /health.
      - run: bun run smoke:node:boot
